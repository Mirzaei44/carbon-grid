<!DOCTYPE html>
<html>
<head>
    <title>Carbon Grid Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 30px;
            background: #f7f7f7;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            max-width: 1000px;
            margin: 0 auto;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        h1 {
            margin-top: 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Carbon Grid Dashboard</h1>
        <canvas id="carbonChart"></canvas>
    </div>

    {{ labels|json_script:"labels-data" }}
    {{ actual_values|json_script:"actual-data" }}
    {{ forecast_values|json_script:"forecast-data" }}

    <script>
        const labels = JSON.parse(document.getElementById("labels-data").textContent);
        const actualValues = JSON.parse(document.getElementById("actual-data").textContent);
        const forecastValues = JSON.parse(document.getElementById("forecast-data").textContent);

        const ctx = document.getElementById('carbonChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Actual Intensity',
                        data: actualValues,
                    },
                    {
                        label: 'Forecast Intensity',
                        data: forecastValues,
                    }
                ]
            }
        });
    </script>
</body>
</html>
